<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DDSlot777 Admin</title>
    <link rel="stylesheet" href="admin.css">
  </head>
  <body>
    <main class="admin-shell">
      <aside class="admin-sidebar">
        <a class="brand" href="/">
          <span></span>
          <strong>DDSlot777</strong>
          <b>Admin</b>
        </a>
        <nav class="side-nav" aria-label="Admin sections">
          <button class="active" type="button" data-section="overview">总览</button>
          <button type="button" data-section="members">会员</button>
          <button type="button" data-section="deposits">充值</button>
          <button type="button" data-section="withdrawals">提现</button>
          <button type="button" data-section="logs">日志</button>
        </nav>
        <div class="admin-session">
          <span data-session-label>未登录</span>
          <button type="button" data-logout>退出</button>
        </div>
      </aside>

      <section class="admin-main">
        <header class="admin-header">
          <div>
            <p>运营后台</p>
            <h1 data-page-title>总览</h1>
          </div>
          <div class="header-actions">
            <button type="button" data-refresh>刷新</button>
            <a href="/" target="_blank" rel="noreferrer">打开前端</a>
          </div>
        </header>

        <section class="login-panel" data-login-panel>
          <form class="login-box" data-login-form>
            <h2>管理员登录</h2>
            <label>
              账号
              <input name="username" autocomplete="username" value="admin">
            </label>
            <label>
              密码
              <input name="password" type="password" autocomplete="current-password" value="admin123">
            </label>
            <button type="submit">登录后台</button>
            <p data-login-error></p>
          </form>
        </section>

        <section class="dashboard" data-dashboard hidden>
          <section class="stats-grid" data-section-panel="overview">
            <article>
              <span>会员数量</span>
              <strong data-stat="memberCount">0</strong>
            </article>
            <article>
              <span>会员总余额</span>
              <strong data-stat="totalBalance">$0.00</strong>
            </article>
            <article>
              <span>待确认充值</span>
              <strong data-stat="pendingDeposits">0</strong>
            </article>
            <article>
              <span>待审核提现</span>
              <strong data-stat="pendingWithdrawals">0</strong>
            </article>
          </section>

          <section class="panel" data-section-panel="members" hidden>
            <div class="panel-title">
              <h2>会员列表</h2>
              <p>可直接调整余额，所有操作会写入日志。</p>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>会员</th>
                    <th>手机号</th>
                    <th>余额</th>
                    <th>状态</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody data-members-table></tbody>
              </table>
            </div>
          </section>

          <section class="panel" data-section-panel="deposits" hidden>
            <div class="panel-title">
              <h2>充值订单</h2>
              <p>确认后会把充值金额和赠金一起加到会员余额。</p>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>订单</th>
                    <th>会员</th>
                    <th>金额</th>
                    <th>赠金</th>
                    <th>状态</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody data-deposits-table></tbody>
              </table>
            </div>
          </section>

          <section class="panel" data-section-panel="withdrawals" hidden>
            <div class="panel-title">
              <h2>提现订单</h2>
              <p>通过后才扣除会员余额，拒绝不会改变余额。</p>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>订单</th>
                    <th>会员</th>
                    <th>金额</th>
                    <th>方式</th>
                    <th>状态</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody data-withdrawals-table></tbody>
              </table>
            </div>
          </section>

          <section class="panel" data-section-panel="logs" hidden>
            <div class="panel-title">
              <h2>操作记录</h2>
              <p>记录管理员确认、拒绝、余额调整和用户提交订单。</p>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>时间</th>
                    <th>操作者</th>
                    <th>动作</th>
                    <th>对象</th>
                    <th>详情</th>
                  </tr>
                </thead>
                <tbody data-logs-table></tbody>
              </table>
            </div>
          </section>
        </section>
      </section>
    </main>

    <div class="toast" data-toast></div>
    <script src="admin.js"></script>
  </body>
</html>
